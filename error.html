<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Error — Cat Translator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <div class="logo">Cat <span>Translator</span></div>
    <div class="tagline">English ↔ Cat · English ↔ Stormy</div>
    <nav class="site-nav">
      <a href="index.html" class="nav-link">Translate</a>
      <a href="words.html" class="nav-link">Word List</a>
      <a href="about.html" class="nav-link">About</a>
    </nav>
  </header>

  <div class="error-page-wrap" id="error-wrap">

    <div class="error-page-cat" id="error-cat">😿</div>

    <div class="error-page-code" id="error-code-display">ERROR</div>

    <h1 class="error-page-title" id="error-title">Something went wrong</h1>

    <p class="error-page-body" id="error-body">
      An unexpected error occurred. The cat is looking into it.
    </p>

    <div class="error-page-actions">
      <a href="index.html" class="error-page-btn primary">Go to Translator</a>
      <button class="error-page-btn" onclick="window.history.back()">Go Back</button>
      <button class="error-page-btn" onclick="window.location.reload()">Reload</button>
    </div>

    <div class="error-detail-block" id="error-detail-block" style="display:none">
      <div class="error-detail-header" id="error-detail-toggle">
        Technical details
        <span id="error-detail-arrow">▸</span>
      </div>
      <div class="error-detail-body" id="error-detail-body">
        <dl id="error-detail-list"></dl>
      </div>
    </div>

  </div>

  <footer class="site-footer">made by <a href="https://github.com/mrdkmkl" target="_blank">@mrdkmkl</a></footer>

  <script>
  // ── Error catalogue ───────────────────────────────────────────────────
  // Each error code maps to a user-facing title, body text, and the
  // appropriate sad cat emoji. Codes are prefixed:
  //   CT-1xx  Worker / engine errors
  //   CT-2xx  Dictionary errors
  //   CT-3xx  Translation errors
  //   CT-4xx  Input / limit errors
  //   CT-5xx  Network / load errors
  //   CT-9xx  Unknown / catch-all

  var ERROR_CATALOGUE = {
    'CT-100': {
      cat:   '🙀',
      title: 'Worker Failed to Start',
      body:  'The translation engine could not launch. This usually happens when the page is opened directly from the filesystem (file://) without a local server. Try serving the files over HTTP, or open in a modern browser.',
      hint:  'Try: python3 -m http.server 8000, then open localhost:8000',
    },
    'CT-101': {
      cat:   '😿',
      title: 'Worker Timed Out',
      body:  'The translation engine took too long to respond. The page will fall back to direct mode. If translation still fails, try reloading.',
      hint:  'Direct mode is slower but works without a Worker.',
    },
    'CT-102': {
      cat:   '🙀',
      title: 'Worker Crashed',
      body:  'The background translation thread crashed unexpectedly. The page has switched to direct mode. A reload may help.',
      hint:  'Check the browser console for the underlying error.',
    },
    'CT-200': {
      cat:   '😿',
      title: 'Dictionary Not Loaded',
      body:  'The word dictionary failed to load. Make sure dictionary.js is in the same folder as index.html and all files are served together.',
      hint:  'Required files: index.html, dictionary.js, worker.js, translator.js, styles.css',
    },
    'CT-201': {
      cat:   '😼',
      title: 'Dictionary Integrity Error',
      body:  'The dictionary loaded but contains unexpected data. One or more word entries may be malformed.',
      hint:  'Try re-downloading the dictionary.js file.',
    },
    'CT-300': {
      cat:   '😾',
      title: 'Translation Failed',
      body:  'An error occurred during translation. The engine received your input but could not produce output.',
      hint:  'Try shorter text, or check for unusual characters.',
    },
    'CT-301': {
      cat:   '🙄',
      title: 'Unknown Direction',
      body:  'The translation direction was not recognised. This is a bug — please report it.',
      hint:  'Valid directions: to-cat, to-stormy, from-cat, from-stormy.',
    },
    'CT-302': {
      cat:   '😿',
      title: 'Reverse Lookup Failed',
      body:  'The translator could not match any of the input sounds to known English words. The input may not be valid Cat or Stormy.',
      hint:  'Make sure you\'re pasting sounds generated by this translator.',
    },
    'CT-400': {
      cat:   '😾',
      title: 'Input Too Long',
      body:  'The input exceeds the 100-word limit for English → Cat and English → Stormy translation. Please shorten your text.',
      hint:  'There is no word limit when translating from Cat or Stormy back to English.',
    },
    'CT-401': {
      cat:   '😹',
      title: 'Empty Input',
      body:  'Nothing to translate. Type something in the input box first.',
      hint:  'Or press the Random button in Cat → English mode for an example.',
    },
    'CT-500': {
      cat:   '😿',
      title: 'Script Load Error',
      body:  'One or more required script files failed to load. Check that all files are present and the server is running.',
      hint:  'Required: dictionary.js, worker.js, translator.js',
    },
    'CT-501': {
      cat:   '😿',
      title: 'Font Load Error',
      body:  'The page fonts could not load. This is cosmetic only — the translator will still work, but text may look different.',
      hint:  'Fonts are loaded from Google Fonts. Check your internet connection.',
    },
    'CT-402': {
      cat:   '😾',
      title: 'Too Many Characters for One Word',
      body:  'A single word in your input exceeds the 34-character limit. The translator cannot process words that long — try breaking it up or removing it.',
      hint:  'Max 34 characters per word. Spaces reset the count.',
    },
    'CT-403': {
      cat:   '🙄',
      title: 'Unreadable Input',
      body:  'The input contains only symbols, numbers, or whitespace with no translatable content.',
      hint:  'Type real words — letters only work best.',
    },
    'CT-404': {
      cat:   '😼',
      title: 'Invalid Tone Level',
      body:  'The tone level was outside the valid range. Cat accepts 1–3, Stormy accepts 1–5. The translator reset it to default.',
      hint:  'This is usually caused by a browser extension interfering with the slider.',
    },
    'CT-405': {
      cat:   '😿',
      title: 'Clipboard Error',
      body:  'The browser denied access to the clipboard. This often happens when the page is not served over HTTPS, or clipboard permissions are blocked.',
      hint:  'You can still select the output text manually and copy with Ctrl+C.',
    },
    'CT-501': {
      cat:   '😿',
      title: 'Random Phrase Failed',
      body:  'The random phrase generator could not produce a phrase. The phrase cache may not have been built yet.',
      hint:  'Try switching to Cat → English or Stormy → English mode first, then click Random again.',
    },
    'CT-502': {
      cat:   '😼',
      title: 'Swap Failed',
      body:  'The swap direction could not be determined from the current mode.',
      hint:  'Try selecting a mode manually using the buttons above the translator.',
    },
    'CT-900': {
      cat:   '🙀',
      title: 'Unknown Error',
      body:  'An unexpected error occurred that the translator did not recognise. Check the browser console for details.',
      hint:  'If this keeps happening, try a hard reload (Ctrl+Shift+R / Cmd+Shift+R).',
    },
  };

  // ── Read error from URL params ─────────────────────────────────────────
  function getParam(name) {
    return new URLSearchParams(window.location.search).get(name) || '';
  }

  var code    = getParam('code')    || 'CT-900';
  var context = getParam('context') || '';
  var from    = getParam('from')    || '';

  var info = ERROR_CATALOGUE[code] || ERROR_CATALOGUE['CT-900'];

  // ── Render ────────────────────────────────────────────────────────────
  document.getElementById('error-cat').textContent          = info.cat;
  document.getElementById('error-code-display').textContent = code;
  document.getElementById('error-title').textContent        = info.title;
  document.getElementById('error-body').textContent         = info.body;

  // ── Technical detail block ────────────────────────────────────────────
  var detailItems = [];
  detailItems.push({ label: 'Error Code',  value: code });
  detailItems.push({ label: 'Description', value: info.title });
  detailItems.push({ label: 'Hint',        value: info.hint });
  if (context) detailItems.push({ label: 'Context', value: decodeURIComponent(context) });
  if (from)    detailItems.push({ label: 'From',    value: decodeURIComponent(from) });
  detailItems.push({ label: 'User Agent',  value: navigator.userAgent });
  detailItems.push({ label: 'Time',        value: new Date().toISOString() });
  detailItems.push({ label: 'URL',         value: window.location.href });

  var block = document.getElementById('error-detail-block');
  var list  = document.getElementById('error-detail-list');
  block.style.display = '';
  list.innerHTML = detailItems.map(function(item) {
    return '<dt>' + item.label + '</dt><dd>' + escHtml(item.value) + '</dd>';
  }).join('');

  // ── Toggle technical details ──────────────────────────────────────────
  var toggle = document.getElementById('error-detail-toggle');
  var body   = document.getElementById('error-detail-body');
  var arrow  = document.getElementById('error-detail-arrow');
  toggle.addEventListener('click', function() {
    var open = body.classList.toggle('open');
    arrow.textContent = open ? '▾' : '▸';
  });

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  </script>

</body>
</html>
